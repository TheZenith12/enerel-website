<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Энэрэлд</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
      padding: 16px;
      position: relative;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.95);
      padding: 36px 28px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
      position: relative;
      overflow: hidden;
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 12px;
      font-size: 26px;
    }

    p {
      color: #444;
      font-size: 16px;
      line-height: 1.6;
      min-height: 80px;
      margin-bottom: 20px;
      transition: all 0.4s ease;
    }

    button {
      padding: 14px 0;
      width: 100%;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(255,0,100,0.3);
    }

    .heart {
      font-size: 48px;
      margin-bottom: 12px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating-heart {
      position: absolute;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      25% { transform: rotate(10deg); }
      50% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
      100% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
    }

    /* Responsive */
    @media (min-width: 768px) {
      .card { padding: 48px; }
      h1 { font-size: 30px; }
      p { font-size: 18px; min-height: 90px; }
      button { font-size: 18px; padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="heart">💖</div>
    <h1>Энэрэл ээ</h1>
    <p id="text">Зөвхөн чамд зориулж бичсэн үгнүүд байгаа шүү 💐</p>
    <button id="changeBtn">Дарж үзээрэй 😘</button>
  </div>

  <script>
    const messages = [
      "Чиний инээмсэглэл намайг өдөр бүр аз жаргалтай болгодог 💕",
      "Үргэлж инээгээрэй 😊",
      "Өнөөдөр чи мундаг байсан шүү 🌟",
      "Үргэлж хамт байя, заавал 💍",
      "Чиний инээмсэглэл надад хангалттай 💖",
      "Яг одоо хийж байгаа чинь хангалттай сайн байна 🌈",
      "Өнөөдөр ядарсан байж магадгүй, сайн унтаж амраарай 😌",
      "Өдөр бүр чамтай хамт баймаар байна 🌈",
      "Хичээгээрэй, чи чадна аа 🤍",
      "I 💗 U ",
      "Хүндэтгэсэн Naki..."
    ];

    let index = 0;

    const textEl = document.getElementById("text");
    const btn = document.getElementById("changeBtn");

    btn.addEventListener("click", () => {
      // Уян хатан текст animation
      textEl.style.opacity = 0;
      setTimeout(() => {
        index = (index + 1) % messages.length;
        textEl.innerText = messages[index];
        textEl.style.opacity = 1;
      }, 300);

      createHeart();
    });

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.innerText = "💗";
      heart.style.left = Math.random() * 90 + "vw";
      heart.style.bottom = "0px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }

    // Floating hearts random идэвхжүүлэх
    setInterval(() => {
      if(Math.random() > 0.7) createHeart();
    }, 800);
  </script>

</body>
</html>

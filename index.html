<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Энэрэлд</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      font-family:"Segoe UI", sans-serif;
      overflow:hidden;
      position:relative;
    }

    .card{
      width:100%;
      max-width:400px;
      background:linear-gradient(145deg, #ffffffdd, #ffe6f0dd);
      padding:50px 35px;
      border-radius:30px;
      text-align:center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25),0 0 60px rgba(255,77,109,0.1) inset;
      position:relative;
      overflow:hidden;
      animation:fadeIn 1s ease;
      z-index:2;
    }

    h1{
      color:#ff2d6d;
      margin-bottom:14px;
      font-size:30px;
      text-shadow:0 0 6px rgba(255,77,109,0.6);
    }

    p{
      color:#444;
      font-size:16px;
      line-height:1.6;
      min-height:80px;
      margin-bottom:24px;
      transition:all 0.4s ease;
    }

    button{
      padding:14px 0;
      width:100%;
      border:none;
      border-radius:35px;
      background:linear-gradient(135deg,#ff3d8c,#ff7eb3);
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:transform 0.3s,box-shadow 0.3s;
      box-shadow:0 6px 16px rgba(255,77,109,0.3);
    }

    button:hover{
      transform:scale(1.06);
      box-shadow:0 10px 24px rgba(255,77,109,0.5);
    }

    .heart{
      font-size:50px;
      margin-bottom:14px;
      animation:beat 1s infinite;
      text-shadow:0 0 12px rgba(255,77,109,0.8);
    }

    @keyframes beat{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.35);}
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    .floating-heart{
      position:absolute;
      font-size:28px;
      animation:floatUp 5s linear infinite;
      opacity:0.9;
      pointer-events:none;
      text-shadow:0 0 10px rgba(255,77,109,0.9);
    }

    @keyframes floatUp{
      0%{transform:translateY(0) rotate(0deg);opacity:1;}
      25%{transform:rotate(15deg);}
      50%{transform:rotate(-15deg);}
      75%{transform:rotate(15deg);}
      100%{transform:translateY(-120vh) rotate(0deg);opacity:0;}
    }

    /* Sparkles background */
    .sparkle{
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      opacity:0.8;
      pointer-events:none;
      animation:twinkle 2s infinite;
    }

    @keyframes twinkle{
      0%,100%{opacity:0.2;}
      50%{opacity:1;}
    }

    @media(min-width:768px){
      .card{padding:60px 45px;}
      h1{font-size:34px;}
      p{font-size:18px;min-height:90px;}
      button{font-size:18px;padding:16px;}
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="heart">💖</div>
    <h1>Энэрэл ээ</h1>
    <p id="text">Зөвхөн чамд зориулж бичсэн үгнүүд байгаа шүү 💐</p>
    <button id="changeBtn">Дарж үзээрэй 😘</button>
  </div>

  <!-- Soft music -->
  <audio id="bgMusic" loop autoplay>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
  </audio>

  <script>
    const messages = [
      "Чиний инээмсэглэл намайг өдөр бүр аз жаргалтай болгодог 💕",
      "Үргэлж инээгээрэй 😊",
      "Өнөөдөр чи мундаг байсан шүү 🌟",
      "Үргэлж хамт байя, заавал 💍",
      "Чиний инээмсэглэл надад хангалттай 💖",
      "Яг одоо хийж байгаа чинь хангалттай сайн байна 🌈",
      "Өнөөдөр ядарсан байж магадгүй, сайн унтаж амраарай 😌",
      "Өдөр бүр чамтай хамт баймаар байна 🌈",
      "Хичээгээрэй, чи чадна аа 🤍",
      "I 💗 U ",
      "Хүндэтгэсэн Naki..."
    ];

    let index=0;
    const textEl=document.getElementById("text");
    const btn=document.getElementById("changeBtn");

    btn.addEventListener("click",()=>{
      textEl.style.opacity=0;
      setTimeout(()=>{
        index=(index+1)%messages.length;
        textEl.innerText=messages[index];
        textEl.style.opacity=1;
      },300);
      createHeart();
    });

    function createHeart(){
      const heart=document.createElement("div");
      heart.className="floating-heart";
      heart.innerText="💖";
      heart.style.left=Math.random()*90+"vw";
      heart.style.bottom="0px";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),5000);
    }

    // Random floating hearts
    setInterval(()=>{if(Math.random()>0.65) createHeart();},700);

    // Sparkles background
    for(let i=0;i<80;i++){
      const s=document.createElement("div");
      s.className="sparkle";
      s.style.left=Math.random()*100+"vw";
      s.style.top=Math.random()*100+"vh";
      s.style.width=(2+Math.random()*4)+"px";
      s.style.height=s.style.width;
      s.style.animationDuration=(1+Math.random()*2)+"s";
      document.body.appendChild(s);
    }
  </script>

</body>
</html>

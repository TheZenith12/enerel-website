<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💖 Энэрэлд</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.95);
      padding: 32px 24px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      animation: fadeIn 1.2s ease;
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      color: #444;
      font-size: 16px;
      line-height: 1.5;
      min-height: 60px;
    }

    button {
      margin-top: 22px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .heart {
      font-size: 42px;
      margin-bottom: 10px;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.25); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating-heart {
      position: absolute;
      font-size: 18px;
      animation: floatUp 5s linear infinite;
      opacity: 0.8;
    }

    @keyframes floatUp {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(-100vh); opacity: 0; }
    }

    /* Tablet & desktop adjustments */
    @media (min-width: 768px) {
      .card { padding: 40px; }
      h1 { font-size: 28px; }
      p { font-size: 18px; }
      button { font-size: 18px; padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="heart">💖</div>
    <h1>Энэрэл ээ</h1>
    <p id="text">
      Зөвхөн чамд зориулж бичсэн үгнүүд байгаа шүү 💐
    </p>
    <button onclick="changeText()">Дарж үзээрэй 😘</button>
  </div>

  <script>
    const messages = [
      "Чиний инээмсэглэл намайг өдөр бүр аз жаргалтай болгодог 💕",
      "Үргэлж инээгээрэй 😊",
      "Өнөөдөр чи мундаг байсан шүү 🌟",
      "Үргэлж хамт байя, заавал 💍",
      "Чиний инээмсэглэл надад хангалттай 💖",
      "Яг одоо хийж байгаа чинь хангалттай сайн байна 🌈",
      "Өнөөдөр ядарсан байж магадгүй, сайн унтаж амраарай 😌",
      "Өдөр бүр чамтай хамт баймаар байна 🌈",
      "Хичээгээрэй, чи чадна аа 🤍",
      "I 💗 U ",
      "Хүндэтгэсэн Naki..."
    ];

    let index = 0;

    function changeText() {
      index = (index + 1) % messages.length;
      document.getElementById("text").innerText = messages[index];
      createHeart();
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.innerText = "💗";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.bottom = "0px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }
  </script>

</body>
</html>
